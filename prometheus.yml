global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "ai-forge"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "docker"
    static_configs:
      - targets: ["host.docker.internal:9323"]

  - job_name: "ollama"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["ollama:11434"]

  - job_name: "n8n"
    static_configs:
      - targets: ["n8n:5678"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
