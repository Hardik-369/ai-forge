# AI-Forge: Self-hosted AI Automation Stack
# Version: 1.0.0
# Core stack - Ollama + Open WebUI + n8n + PostgreSQL

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-restart-policy: &restart-policy
  restart: unless-stopped

networks:
  ai-forge-network:
    external: false
    name: ${DOCKER_NETWORK:-ai-forge-network}
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  openwebui_data:
    driver: local
  qdrant_data:
    driver: local
  n8n_data:
    driver: local

services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-forge-postgres
    <<: *restart-policy
    networks:
      - ai-forge-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-ai_forge}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT_DB:-1g}

  redis:
    image: redis:7-alpine
    container_name: ai-forge-redis
    <<: *restart-policy
    networks:
      - ai-forge-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?error}
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  ollama:
    image: ollama/ollama:latest
    container_name: ai-forge-ollama
    <<: *restart-policy
    networks:
      - ai-forge-network
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-4}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: ${MEMORY_LIMIT_AI:-4g}

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-forge-openwebui
    <<: *restart-policy
    networks:
      - ai-forge-network
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:?error}
      WEBUI_NAME: AI-Forge
      ENABLE_SIGNUP: "false"
      DEFAULT_MODELS: llama3.2:latest
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT_AI:-4g}

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-forge-qdrant
    <<: *restart-policy
    networks:
      - ai-forge-network
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g

  n8n:
    image: n8nio/n8n:latest
    container_name: ai-forge-n8n
    <<: *restart-policy
    networks:
      - ai-forge-network
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?error}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:?error}
      N8N_HOST: ${DOMAIN:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      WEBHOOK_URL: http://${DOMAIN:-localhost}:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-ai_forge}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-ai_forge}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?error}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT_AUTOMATION:-512m}
