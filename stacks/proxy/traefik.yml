# Traefik Reverse Proxy Stack
# Deploy alongside docker-compose.yml for SSL and routing

networks:
  ai-forge-network:
    external: true
    name: ai-forge-network

volumes:
  traefik_letsencrypt:
    driver: local

services:
  traefik:
    image: traefik:v3.3
    container_name: ai-forge-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=${TRAEFIK_DASHBOARD_ENABLED:-false}"
      - "--api.debug=false"
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ai-forge-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${CERT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpChallenge.entrypoint=web"
    networks:
      - ai-forge-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-ai-forge.local}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$2y$$10$$...}"
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT_PROXY:-256m}

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-forge-openwebui
    restart: unless-stopped
    networks:
      - ai-forge-network
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:?error}
      WEBUI_NAME: AI-Forge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${DOMAIN:-ai-forge.local}`)"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.tls.certresolver=letsencrypt"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"

  n8n:
    image: n8nio/n8n:latest
    container_name: ai-forge-n8n
    restart: unless-stopped
    networks:
      - ai-forge-network
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?error}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:?error}
      N8N_HOST: n8n.${DOMAIN:-ai-forge.local}
      N8N_PROTOCOL: https
      NODE_ENV: production
      WEBHOOK_URL: https://n8n.${DOMAIN:-ai-forge.local}/
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN:-ai-forge.local}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
